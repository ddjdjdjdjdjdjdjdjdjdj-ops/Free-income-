<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মিষ্টি AM - Ludo Pro</title>
    <script src="https://alwingulla.com/88/p.js" data-p="10711953" async></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; margin: 0; padding-bottom: 70px; text-align: center; }
        .header { background: #fff; padding: 15px; border-bottom: 2px solid #ddd; position: sticky; top: 0; z-index: 1000; }
        .balance-box { font-size: 30px; font-weight: 900; color: #000; }

        .section { display: none; padding: 15px; }
        .section.active { display: block; }

        /* আসল লুডু বোর্ড ডিজাইন (ভিডিওর মতো) */
        #ludoContainer { display: none; margin-top: 10px; }
        .ludo-board { 
            width: 320px; height: 320px; margin: auto; background: #fff;
            display: grid; grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(15, 1fr);
            border: 4px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }
        /* বোর্ড কালারিং লজিক */
        .cell { border: 0.1px solid #ddd; box-sizing: border-box; }
        .r-box { background: #ff4757; } .g-box { background: #2ed573; }
        .y-box { background: #ffa502; } .b-box { background: #1e90ff; }
        .home-area { grid-column: span 6; grid-row: span 6; display: flex; align-items: center; justify-content: center; border: 2px solid #333; }
        
        .dice-btn { font-size: 45px; cursor: pointer; background: white; border-radius: 10px; padding: 5px 15px; border: 2px solid #333; display: inline-block; margin-top: 20px; }

        /* অ্যাড বাটন */
        .ad-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .ad-btn { background: #28a745; color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .ad-btn:disabled { background: #bbb; cursor: not-allowed; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #222; display: flex; padding: 10px 0; border-top-left-radius: 20px; border-top-right-radius: 20px; }
        .nav-item { color: #888; flex: 1; font-size: 12px; cursor: pointer; text-decoration: none; outline: none; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 22px; display: block; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; color:#FF512F;">মিষ্টি AM 🥭</h2>
        <div class="balance-box"><span id="balance">0</span> ৳</div>
    </div>

    <div id="homeSection" class="section active">
        <p style="font-weight:bold; color:red;">প্রতি ১২ ঘণ্টায় ১ বার অ্যাড দেখা যাবে</p>
        <div id="adGrid" class="ad-grid"></div>
    </div>

    <div id="gameSection" class="section">
        <div id="menu">
            <button onclick="playLudo(20, 75)" style="width:100%; padding:20px; background:#FF512F; color:white; border:none; border-radius:15px; font-size:18px; font-weight:bold; margin-bottom:10px;">লুডু খেলুন (২০৳ এন্ট্রি)</button>
        </div>

        <div id="ludoContainer">
            <div class="ludo-board">
                <div class="home-area r-box" style="grid-area: 1/1/7/7;">🔴</div>
                <div class="home-area g-box" style="grid-area: 1/10/7/16;">🟢</div>
                <div class="home-area y-box" style="grid-area: 10/10/16/16;">🟡</div>
                <div class="home-area b-box" style="grid-area: 10/1/16/7;">🔵</div>
                <div style="grid-area: 7/7/10/10; background:#eee; font-size:10px; display:flex; align-items:center;">HOME</div>
            </div>
            <div class="dice-btn" id="dice" onclick="rollDice()">🎲</div>
            <p id="ludoStatus" style="font-weight:bold; margin-top:10px;">আপনার চাল দিন</p>
        </div>
    </div>

    <div id="referSection" class="section">
        <div style="background:white; padding:20px; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.1);">
            <h3>বন্ধুকে ইনভাইট করুন</h3>
            <p>আপনার রেফার আইডি: #<span id="uid">...</span></p>
            <button onclick="ref('wa')" style="background:#25D366; color:white; border:none; padding:15px; width:100%; border-radius:10px; font-weight:bold; margin-bottom:10px;"><i class="fab fa-whatsapp"></i> WhatsApp Share</button>
            <button onclick="ref('tg')" style="background:#0088cc; color:white; border:none; padding:15px; width:100%; border-radius:10px; font-weight:bold;"><i class="fab fa-telegram"></i> Telegram Share</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home', this)"><i class="fas fa-house"></i><span>HOME</span></div>
        <div class="nav-item" onclick="switchTab('refer', this)"><i class="fas fa-users"></i><span>REFER</span></div>
        <div class="nav-item" onclick="switchTab('game', this)"><i class="fas fa-trophy"></i><span>GAMES</span></div>
        <a href="https://t.me/mistiam5" class="nav-item" target="_blank" style="color:#888;"><i class="fab fa-telegram"></i><span>CHANNEL</span></a>
    </div>

    <script>
        let balance = localStorage.getItem('b') ? parseInt(localStorage.getItem('b')) : 0;
        let myID = localStorage.getItem('myID') || Math.floor(100000 + Math.random() * 900000);
        localStorage.setItem('myID', myID);
        document.getElementById('uid').innerText = myID;

        function updateUI() { document.getElementById('balance').innerText = balance; }
        
        function switchTab(tab, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tab + 'Section').classList.add('active');
            if(btn) btn.classList.add('active');
        }

        // ২০টি অ্যাড বাটন এবং ১২ ঘণ্টার লজিক
        const grid = document.getElementById('adGrid');
        for(let i=1; i<=20; i++) {
            const btn = document.createElement('button');
            btn.className = 'ad-btn';
            btn.innerText = "অ্যাড " + i;
            
            let lastView = localStorage.getItem('ad_time_' + i);
            let now = new Date().getTime();

            // ১২ ঘণ্টা = ৪৩,২০০,০০০ মিলিসেকেন্ড
            if (lastView && (now - lastView < 43200000)) {
                btn.disabled = true;
                btn.innerText = "অপেক্ষা করুন";
            } else {
                btn.onclick = () => {
                    window.open("https://omg10.com/4/10692961", "_blank");
                    setTimeout(() => {
                        balance += 5;
                        localStorage.setItem('b', balance);
                        localStorage.setItem('ad_time_' + i, new Date().getTime());
                        updateUI();
                        location.reload();
                    }, 5000);
                };
            }
            grid.appendChild(btn);
        }

        // লুডু লজিক
        let pScore = 0, cScore = 0, prize = 0;
        function playLudo(e, p) {
            if(balance < e) { alert("ব্যালেন্স নেই!"); return; }
            balance -= e; prize = p; updateUI();
            document.getElementById('menu').style.display = 'none';
            document.getElementById('ludoContainer').style.display = 'block';
        }

        function rollDice() {
            let roll = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice').innerText = roll;
            pScore += roll;
            document.getElementById('ludoStatus').innerText = "আপনার স্কোর: " + pScore;

            setTimeout(() => {
                let cRoll = Math.floor(Math.random() * 6) + 1;
                cScore += cRoll;
                if(pScore >= 50) { alert("আপনি জিতেছেন!"); balance += prize; end(); }
                else if(cScore >= 50) { alert("কম্পিউটার জিতে গেছে!"); end(); }
            }, 600);
        }

        function end() { localStorage.setItem('b', balance); location.reload(); }

        function ref(p) {
            const link = "https://t.me/mistiambot";
            const text = "মিষ্টি AM অ্যাপে অ্যাড দেখে ও লুডু খেলে আয় করুন। আমার আইডি: " + myID;
            if(p === 'wa') window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text + " " + link)}`);
            else window.open(`https://t.me/share/url?url=${link}&text=${encodeURIComponent(text)}`);
        }

        updateUI();
    </script>
</body>
</html>
