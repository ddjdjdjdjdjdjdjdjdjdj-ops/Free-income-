<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X WORLD ❄️</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        h1 { margin: 0; font-size: 24px; color: #e11d48; letter-spacing: 2px; }
        
        .container {
            max-width: 600px;
            margin: 10px auto;
            padding: 10px;

        /* চ্যানেল উইজেট ডিজাইন */

            background: #111;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #222;
        }

        .join-btn {
            display: block;
            width: 80%;
            max-width: 300px;
            margin: 20px auto;
            padding: 12px;
            background: #24A1DE;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(36, 161, 222, 0.3);
        }
    </style>
</head>
<body>

    <header>
        <h1>❄️ X WORLD ❄️</h1>
    </header>

    <div class="container">
        <div class="tg-widget">
            <script async src="https://telegram.org/js/telegram-widget.js?22" 
                    data-telegram-channel="xworld9" 
                    data-limit="15" 
                    data-dark="1"></script>
        </div>
    </div>

    <a href="https://t.me/xworld9" class="join-btn">চ্যানেলে জয়েন করুন 🚀</a>
