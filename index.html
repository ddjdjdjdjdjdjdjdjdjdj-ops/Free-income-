<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X WORLD ❄️</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        header { text-align: center; padding: 10px; border-bottom: 2px solid #222; }
        #adminArea { display: none; background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 20px 0; border: 1px dashed #FF0000; }
        input { width: 93%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; }
        button { width: 100%; padding: 12px; background: #FF0000; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .video-card { background: #111; border-radius: 10px; overflow: hidden; margin-bottom: 20px; border: 1px solid #333; }
        iframe { width: 100%; height: 220px; border: none; }
        .video-title { padding: 10px; text-align: center; font-size: 14px; color: #ccc; }
    </style>
</head>
<body>

    <header><h1>❄️ X WORLD ❄️</h1></header>

    <div id="adminArea">
        <h3 style="margin:0; color: #FF0000;">ইউটিউব ভিডিও অ্যাড করুন 🛠️</h3>
        <input type="text" id="videoUrl" placeholder="YouTube Video Link (যেমন: https://youtu.be/...)">
        <input type="text" id="videoTitle" placeholder="ভিডিওর নাম বা টাইটেল">
        <button onclick="addYoutubeVideo()">অ্যাড করুন 🎉</button>
        <p id="status" style="text-align:center; font-size:13px; color:yellow;"></p>
    </div>

    <div id="videoList" style="margin-top:20px;">
        <p style="text-align:center; color:#666;">ভিডিও লোড হচ্ছে... ❄️</p>
    </div>

    <script>
        // আপনার Misti AM কনফিগ
        const firebaseConfig = {
          apiKey: "AIzaSyBWhYvIKGHfDO4NrH0G5N692FljzD_wmZc",
          authDomain: "misti-am.firebaseapp.com",
          databaseURL: "https://misti-am-default-rtdb.firebaseio.com",
          projectId: "misti-am",
          storageBucket: "misti-am.firebasestorage.app",
          messagingSenderId: "335857181187",
          appId: "1:335857181187:web:4dc1f6ca2b79e1e0262436"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // অ্যাডমিন চেক
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('admin') === 'misti786') {
            document.getElementById('adminArea').style.display = 'block';
        }

        // ইউটিউব লিঙ্ক থেকে ID বের করার ফাংশন
        function getYoutubeID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        async function addYoutubeVideo() {
            const url = document.getElementById('videoUrl').value;
            const title = document.getElementById('videoTitle').value;
            const status = document.getElementById('status');
            const videoId = getYoutubeID(url);

            if(!videoId) return alert("সঠিক ইউটিউব লিঙ্ক দিন!");

            status.innerText = "সেভ হচ্ছে...";
            try {
                await db.collection("x_youtube_videos").add({
                    videoId: videoId,
                    title: title || "X World Video",
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                status.innerText = "ইউটিউব ভিডিও অ্যাড হয়েছে! ✅";
                document.getElementById('videoUrl').value = "";
                document.getElementById('videoTitle').value = "";
            } catch (e) { status.innerText = "Error: Firestore Rules চেক করুন।"; }
        }

        // ভিডিও দেখানো
        db.collection("x_youtube_videos").orderBy("createdAt", "desc").onSnapshot((snap) => {
            const list = document.getElementById('videoList');
            list.innerHTML = "";
            snap.forEach((doc) => {
                const data = doc.data();
                list.innerHTML += `
                    <div class="video-card">
                        <iframe src="https://www.youtube.com/embed/${data.videoId}" allowfullscreen></iframe>
                        <div class="video-title">${data.title}</div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
