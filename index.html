<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X WORLD</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        
        /* সিম্পল হেডার: শুধু নাম এবং লোগো */
        header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            background: #000;
            border-bottom: 1px solid #111;
        }
        .logo-img { width: 40px; height: 40px; border-radius: 8px; }
        .site-name { font-size: 24px; font-weight: bold; letter-spacing: 2px; }

        /* ভিডিও গ্রিড সিস্টেম */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px;
            padding: 5px;
        }
        .video-box {
            background: #111;
            aspect-ratio: 9/16; /* লম্বালম্বি থাম্বনেইল */
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }
        .video-box video { width: 100%; height: 100%; object-fit: cover; }
        
        /* টিকটক স্টাইল ফুল স্ক্রিন প্লেয়ার */
        #fullPlayer {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000;
        }
        #fullVideo { width: 100%; height: 100%; object-fit: contain; }
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            font-size: 30px; color: #fff; cursor: pointer; z-index: 1100;
        }
    </style>
</head>
<body>

    <header>
        <img src="https://i.ibb.co/m5Z6K7Y/image-search-1773302859765.jpg" class="logo-img">
        <div class="site-name">X WORLD</div>
    </header>

    <div class="grid-container" id="videoList">
        <p style="text-align:center; grid-column: span 2; padding: 20px;">লোড হচ্ছে...</p>
    </div>

    <div id="fullPlayer">
        <div class="back-btn" onclick="closeVideo()">✕</div>
        <video id="fullVideo" controls autoplay loop></video>
    </div>

    <script>
        // আপনার Firebase কনফিগ
        const firebaseConfig = {
            apiKey: "AIzaSyBe87sb10Fsi2yHoj-X1OOVi6xMGhgVhjw",
            authDomain: "studio-4738098761-3b90d.firebaseapp.com",
            projectId: "studio-4738098761-3b90d",
            storageBucket: "studio-4738098761-3b90d.firebasestorage.app",
            messagingSenderId: "951804332123",
            appId: "1:951804332123:web:1c40865e7c071a64b0177e"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ডাটাবেস থেকে ভিডিও নিয়ে আসা
        function fetchVideos() {
            db.collection("videos").orderBy("time", "desc").onSnapshot(snap => {
                const list = document.getElementById('videoList');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const data = doc.data();
                    list.innerHTML += `
                        <div class="video-box" onclick="openVideo('${data.url}')">
                            <video src="${data.url}#t=0.1"></video>
                        </div>`;
                });
            });
        }

        function openVideo(url) {
            const player = document.getElementById('fullPlayer');
            const video = document.getElementById('fullVideo');
            video.src = url;
            player.style.display = 'block';
        }

        function closeVideo() {
            const player = document.getElementById('fullPlayer');
            const video = document.getElementById('fullVideo');
            player.style.display = 'none';
            video.pause();
            video.src = "";
        }

        fetchVideos();
    </script>
</body>
</html>
