<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X World</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f0f0f; color: white; padding-bottom: 70px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #0f0f0f; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #272727; }
        .logo { font-size: 24px; font-weight: bold; color: #fff; letter-spacing: 1px; }
        .logo span { color: #ff0000; }
        .header-icons { display: flex; gap: 20px; align-items: center; font-size: 20px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0f0f0f; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #272727; z-index: 1000; }
        .nav-item { color: #fff; font-size: 22px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .nav-item span { font-size: 10px; }
        .nav-item.active { color: #ff0000; }
        .section { display: none; padding: 15px; }
        .section.active { display: block; }
        .video-card { background: #000; margin-bottom: 20px; width: 100%; border-bottom: 4px solid #111; }
        video { width: 100%; max-height: 250px; background: #000; }
        .video-info { padding: 12px; display: flex; gap: 10px; }
        .uploader-pic { width: 40px; height: 40px; border-radius: 50%; }
        .vid-title { font-size: 16px; margin: 0 0 5px 0; }
        .btn-style { background: #ff0000; color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div id="mainApp" style="display:none;">
        <div class="header">
            <div class="logo">X <span>World</span></div>
            <div class="header-icons">
                <i class="fas fa-search" onclick="toggleSearch()"></i>
                <img id="headAvatar" src="" style="border-radius:50%; width:30px; height:30px;">
            </div>
        </div>

        <div id="homeSection" class="section active">
            <div id="feedArea">লোড হচ্ছে...</div>
        </div>

        <div id="uploadSection" class="section">
            <div style="background:#222; padding:20px; border-radius:10px;">
                <input type="text" id="vidTitle" placeholder="ভিডিওর টাইটেল..." style="width:100%; padding:10px; margin-bottom:10px; background:#333; color:#fff; border:none; border-radius:5px;">
                <input type="file" id="vidFile" accept="video/*" style="margin-bottom:10px;">
                <button class="btn-style" onclick="uploadVideo()" id="uploadBtn">পাবলিশ করুন</button>
            </div>
        </div>

        <div id="profileSection" class="section">
            <div style="text-align:center; background:#222; padding:20px; border-radius:10px;">
                <img id="userPic" src="" style="width:80px; border-radius:50%;">
                <h3 id="userName"></h3>
                <button onclick="logOut()" style="background:#444; color:white; border:none; padding:10px 20px; border-radius:20px;">লগআউট</button>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('home', this)"><i class="fas fa-home"></i><span>Home</span></div>
            <div class="nav-item" onclick="switchTab('upload', this)"><i class="fas fa-plus-circle" style="font-size:35px; color:red"></i><span>Upload</span></div>
            <div class="nav-item" onclick="switchTab('profile', this)"><i class="fas fa-user"></i><span>Profile</span></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        // আপনার ফিক্সড ফায়ারবেস কনফিগ
        const firebaseConfig = {
            apiKey: "AIzaSyBWhYvIKGHfDO4NrH0G5N692FljzD_wmZc",
            authDomain: "misti-am.firebaseapp.com",
            projectId: "misti-am",
            storageBucket: "misti-am.firebasestorage.app",
            messagingSenderId: "335857181187",
            appId: "1:335857181187:web:ce34124f9daea3a4262436"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore(app);
        const storage = getStorage(app);

        // অটো লগইন পপআপ
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('userPic').src = user.photoURL;
                document.getElementById('headAvatar').src = user.photoURL;
                document.getElementById('userName').innerText = user.displayName;
                loadVideos();
            } else {
                const provider = new GoogleAuthProvider();
                signInWithPopup(auth, provider).catch(e => console.log("Login Error"));
            }
        });

        window.switchTab = (tab, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tab + 'Section').classList.add('active');
            el.classList.add('active');
        };

        window.uploadVideo = async () => {
            const title = document.getElementById('vidTitle').value;
            const file = document.getElementById('vidFile').files[0];
            if(!title || !file) return alert("সব তথ্য দিন!");
            
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true; btn.innerText = "আপলোড হচ্ছে...";

            const sRef = ref(storage, 'v/' + Date.now());
            const task = uploadBytesResumable(sRef, file);
            
            task.on('state_changed', null, null, async () => {
                const url = await getDownloadURL(task.snapshot.ref);
                await addDoc(collection(db, "videos"), {
                    title, vidUrl: url, uploaderName: auth.currentUser.displayName,
                    uploaderPic: auth.currentUser.photoURL, timestamp: Date.now()
                });
                alert("সফল!"); location.reload();
            });
        };

        function loadVideos() {
            const q = query(collection(db, "videos"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snap) => {
                const feed = document.getElementById('feedArea');
                feed.innerHTML = "";
                snap.forEach(doc => {
                    const data = doc.data();
                    feed.innerHTML += `
                        <div class="video-card">
                            <video src="${data.vidUrl}" controls></video>
                            <div class="video-info">
                                <img src="${data.uploaderPic}" class="uploader-pic">
                                <div><h3 class="vid-title">${data.title}</h3><p style="color:#aaa;font-size:12px">${data.uploaderName}</p></div>
                            </div>
                        </div>`;
                });
            });
        }

        window.logOut = () => signOut(auth).then(() => location.reload());
    </script>
</body>
    </html>
