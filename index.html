<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X WORLD ❄️</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        header { text-align: center; padding: 15px; background: #111; border-bottom: 2px solid #e11d48; position: sticky; top: 0; z-index: 1000; }
        h1 { margin: 0; font-size: 22px; color: #e11d48; letter-spacing: 2px; }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 15px;
        }

        /* ভিডিও পোস্ট কার্ড */
        .video-card {
            background: #111;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid #222;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* সরাসরি ওয়েবসাইটের ভেতরে ভিডিও রাখার ফ্রেম */
        .tg-frame {
            width: 100%;
            height: 500px; /* ভিডিওর উচ্চতা */
            border: none;
            background: #000;
        }

        .refresh-text {
            text-align: center;
            font-size: 12px;
            color: #444;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>❄️ X WORLD ❄️</h1>
    </header>

    <div class="container" id="video-feed">
        <div class="video-card">
            <script async src="https://telegram.org/js/telegram-widget.js?22" 
                    data-telegram-channel="xwolrd90" 
                    data-limit="10" 
                    data-dark="1"></script>
        </div>
        
        <p class="refresh-text">নতুন ভিডিও দেখতে পেজটি রিফ্রেশ দিন ❄️</p>
    </div>

</body>
</html>
