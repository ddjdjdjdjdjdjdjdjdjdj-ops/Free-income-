<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X World - TikTok Style</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .video-container { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Overlay Info */
        .v-info { position: absolute; bottom: 80px; left: 15px; z-index: 10; }
        .v-info h3 { margin: 0; font-size: 16px; display: flex; align-items: center; gap: 10px; }
        .sub-btn { background: #ff0000; color: #fff; padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; border: none; }
        
        /* Sidebar Buttons */
        .side-bar { position: absolute; right: 10px; bottom: 120px; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .side-icon img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #fff; }
        .action-item { text-align: center; cursor: pointer; }
        .action-item i { font-size: 28px; display: block; }
        .action-item span { font-size: 12px; margin-top: 4px; display: block; }

        /* Bottom Nav */
        .nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.5px solid #333; z-index: 100; }
        .plus-btn { background: linear-gradient(to right, #2af5ff, #ff2d55); padding: 5px 18px; border-radius: 10px; color: #000; font-weight: bold; font-size: 22px; }

        #profilePage { display: none; position: fixed; inset: 0; background: #000; z-index: 200; padding: 20px; text-align: center; }
    </style>
</head>
<body>

<div id="feed"></div>

<div class="nav">
    <div onclick="location.reload()">🏠</div>
    <div class="plus-btn" onclick="document.getElementById('fileInput').click()">+</div>
    <div onclick="openProfile()">👤</div>
</div>

<div id="profilePage">
    <button onclick="closeProfile()" style="float:left; color:#fff; background:none; border:none; font-size:25px;">✕</button>
    <br><br>
    <img id="pImg" src="" style="width:100px; border-radius:50%; border:2px solid #fff;">
    <h2 id="pName"></h2>
    <button onclick="editProfile()" style="background:#333; color:#fff; border:none; padding:10px 20px; border-radius:5px;">Edit Profile</button>
    <br><br>
    <button onclick="auth.signOut().then(()=>location.reload())" style="color:red; background:none; border:none;">Logout</button>
</div>

<input type="file" id="fileInput" accept="video/*" style="display:none" onchange="uploadVideo(event)">

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBe87sb10Fsi2yHoj-X1OOVi6xMGhgVhjw",
      authDomain: "studio-4738098761-3b90d.firebaseapp.com",
      projectId: "studio-4738098761-3b90d",
      storageBucket: "studio-4738098761-3b90d.firebasestorage.app",
      messagingSenderId: "951804332123",
      appId: "1:951804332123:web:1c40865e7c071a64b0177e"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    auth.onAuthStateChanged(user => {
        if (!user) {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        } else {
            document.getElementById('pImg').src = user.photoURL;
            document.getElementById('pName').innerText = user.displayName;
            loadVideos();
        }
    });

    async function uploadVideo(e) {
        const file = e.target.files[0];
        if(!file) return;
        const title = prompt("ভিডিওর টাইটেল লিখুন:");
        alert("আপলোড হচ্ছে...");
        const ref = storage.ref('videos/' + Date.now());
        await ref.put(file);
        const url = await ref.getDownloadURL();
        await db.collection("videos").add({
            url, title, name: auth.currentUser.displayName, pic: auth.currentUser.photoURL,
            likes: 0, subs: 0, time: Date.now()
        });
        alert("সফলভাবে আপলোড হয়েছে!");
        location.reload();
    }

    function loadVideos() {
        db.collection("videos").orderBy("time", "desc").onSnapshot(snap => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snap.forEach(doc => {
                const v = doc.data();
                const id = doc.id;
                feed.innerHTML += `
                <div class="video-container">
                    <video src="${v.url}" loop onclick="this.paused ? this.play() : this.pause()"></video>
                    <div class="v-info">
                        <h3>@${v.name} <button class="sub-btn" onclick="doSub('${id}')">Subscribe</button></h3>
                        <p>${v.title}</p>
                    </div>
                    <div class="side-bar">
                        <div class="side-icon"><img src="${v.pic}"></div>
                        <div class="action-item" onclick="doLike('${id}')">❤️ <span>${v.likes || 0}</span></div>
                        <div class="action-item" onclick="alert('Comment box coming soon!')">💬 <span>0</span></div>
                        <div class="action-item">🚀 <span>Share</span></div>
                    </div>
                </div>`;
            });
        });
    }

    // Like Function
    window.doLike = (id) => {
        db.collection("videos").doc(id).update({
            likes: firebase.firestore.FieldValue.increment(1)
        });
    };

    // Subscribe Function
    window.doSub = (id) => {
        alert("Subscribed to creator!");
        db.collection("videos").doc(id).update({
            subs: firebase.firestore.FieldValue.increment(1)
        });
    };

    window.openProfile = () => document.getElementById('profilePage').style.display = 'block';
    window.closeProfile = () => document.getElementById('profilePage').style.display = 'none';
    
    window.editProfile = () => {
        const n = prompt("নতুন নাম দিন:", auth.currentUser.displayName);
        if(n) auth.currentUser.updateProfile({displayName: n}).then(()=>location.reload());
    };
</script>
</body>
</html>
