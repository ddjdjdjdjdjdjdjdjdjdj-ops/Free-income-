<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X WORLD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* পুরো ওয়েবসাইট ব্ল্যাক থিম */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }

        /* টপ হেডার ডিজাইন */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #000000;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .header-icons {
            display: flex;
            gap: 20px;
            font-size: 20px;
            align-items: center;
        }

        .header-icons i {
            cursor: pointer;
        }

        .profile-img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #444;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ভিডিও গ্রিড সিস্টেম - এক স্ক্রিনে ৮টি ভিডিও (২ কলামে ৪টি রো) */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* মোবাইলে ২ কলাম */
            gap: 10px;
            padding: 10px;
        }

        .video-card {
            background-color: #111;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16/9; /* ভিডিওর সাইজ ঠিক রাখার জন্য */
            position: relative;
        }

        .video-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }

        .video-title {
            position: absolute;
            bottom: 5px;
            left: 5px;
            font-size: 12px;
            background: rgba(0,0,0,0.6);
            padding: 2px 5px;
        }

        /* বটম মেনু (ঐচ্ছিক কিন্তু সুন্দর দেখাবে) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #000;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">X WORLD</div>
        <div class="header-icons">
            <i class="fas fa-search"></i>
            <div class="profile-img">
                <i class="fas fa-user"></i>
            </div>
        </div>
    </header>

    <div class="video-grid">
        <div class="video-card"><img src="https://via.placeholder.com/300x169/222/fff?text=Video+1"></div>
        <div class="video-card"><img src="https://via.placeholder.com/300x169/222/fff?text=Video+2"></div>
        <div class="video-card"><img src="https://via.placeholder.com/300x169/222/fff?text=Video+3"></div>
        <div class="video-card"><img src="https://via.placeholder.com/300x169/222/fff?text=Video+4"></div>
        <div class="video-card"><img src="https://via.placeholder.com/300x169/222/fff?text=Video+5"></div>
        <div class="video-card"><img src="https://via.placeholder.com/300x169/222/fff?text=Video+6"></div>
        <div class="video-card"><img src="https://via.placeholder.com/300x169/222/fff?text=Video+7"></div>
        <div class="video-card"><img src="https://via.placeholder.com/300x169/222/fff?text=Video+8"></div>
    </div>

    <div class="bottom-nav">
        <i class="fas fa-home"></i>
        <i class="fas fa-plus-circle" style="font-size: 24px;"></i>
        <i class="fas fa-play-circle"></i>
    </div>

</body>
</html>
