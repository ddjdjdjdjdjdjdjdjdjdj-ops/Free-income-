<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X WORLD</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: sans-serif; }
        header { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 15px; border-bottom: 1px solid #1a1a1a; }
        .logo-emoji { font-size: 28px; }
        .site-name { font-size: 22px; font-weight: bold; letter-spacing: 2px; }

        /* Home Page Grid */
        #homePage { display: block; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; padding: 5px; }
        .video-box { background: #111; aspect-ratio: 9/16; overflow: hidden; border-radius: 4px; cursor: pointer; }
        .video-box video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* Full Screen Player */
        #fullPlayer { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; }
        #fullVideo { width: 100%; height: 100%; object-fit: contain; }
        .back-btn { position: absolute; top: 20px; left: 20px; font-size: 30px; cursor: pointer; z-index: 1100; }

        /* Admin Panel */
        #adminPanel { display: none; padding: 20px; }
        .admin-box { background: #111; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; }
        .upload-btn { background: #❄️; background-color: #007bff; color: white; padding: 10px; width: 100%; border: none; border-radius: 5px; cursor: pointer; }
        .stat-item { padding: 10px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="homePage">
        <header>
            <span class="logo-emoji">❄️</span>
            <div class="site-name">X WORLD</div>
        </header>
        <div class="grid-container" id="videoList"></div>
    </div>

    <div id="adminPanel">
        <h2 style="text-align:center;">Admin Dashboard ❄️</h2>
        <div class="admin-box">
            <input type="file" id="vidFile" accept="video/*">
            <input type="text" id="vidTitle" placeholder="Video Title">
            <button class="upload-btn" onclick="uploadVideo()">Upload Video</button>
            <p id="upStatus" style="font-size: 12px; color: yellow;"></p>
        </div>
        <h3>All Videos & Views (Admin Only)</h3>
        <div id="adminStats"></div>
    </div>

    <div id="fullPlayer">
        <div class="back-btn" onclick="closeVideo()">✕</div>
        <video id="fullVideo" controls autoplay loop></video>
    </div>

    <script>
        // Apnar Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBe87sb10Fsi2yHoj-X1OOVi6xMGhgVhjw",
            authDomain: "studio-4738098761-3b90d.firebaseapp.com",
            projectId: "studio-4738098761-3b90d",
            storageBucket: "studio-4738098761-3b90d.firebasestorage.app",
            messagingSenderId: "951804332123",
            appId: "1:951804332123:web:1c40865e7c071a64b0177e"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        // Check if Admin
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.get('admin') === 'true') {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadAdminStats();
        } else {
            loadHomeVideos();
        }

        // --- Home Logic ---
        function loadHomeVideos() {
            db.collection("videos").orderBy("time", "desc").onSnapshot(snap => {
                const list = document.getElementById('videoList');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `<div class="video-box" onclick="openVideo('${doc.id}', '${d.url}')">
                        <video src="${d.url}#t=0.1"></video>
                    </div>`;
                });
            });
        }

        function openVideo(id, url) {
            document.getElementById('fullVideo').src = url;
            document.getElementById('fullPlayer').style.display = 'block';
            // Update View Count
            db.collection("videos").doc(id).update({ views: firebase.firestore.FieldValue.increment(1) });
        }

        function closeVideo() {
            document.getElementById('fullPlayer').style.display = 'none';
            document.getElementById('fullVideo').pause();
        }

        // --- Admin Logic ---
        async function uploadVideo() {
            const file = document.getElementById('vidFile').files[0];
            const title = document.getElementById('vidTitle').value;
            const status = document.getElementById('upStatus');
            if(!file || !title) return alert("Title and File required!");

            status.innerText = "Uploading... Please wait.";
            const ref = storage.ref('videos/' + Date.now());
            await ref.put(file);
            const url = await ref.getDownloadURL();

            await db.collection("videos").add({
                url, title, views: 0, time: Date.now()
            });
            status.innerText = "Upload Success! 🎉";
            document.getElementById('vidTitle').value = "";
            loadAdminStats();
        }

        function loadAdminStats() {
            db.collection("videos").orderBy("time", "desc").onSnapshot(snap => {
                const stats = document.getElementById('adminStats');
                stats.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    stats.innerHTML += `<div class="stat-item">
                        <span>${d.title}</span>
                        <span style="color:cyan;">👁️ ${d.views || 0} views</span>
                    </div>`;
                });
            });
        }
    </script>
</body>
</html>
