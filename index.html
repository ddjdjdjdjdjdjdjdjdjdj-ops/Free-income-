<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X WORLD ❄️</title>
    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
        }
        header { 
            text-align: center; 
            padding: 15px; 
            background: #111; 
            border-bottom: 2px solid #e11d48; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        h1 { margin: 0; font-size: 24px; color: #e11d48; letter-spacing: 2px; }
        
        .main-container {
            max-width: 600px;
            margin: 10px auto;
            padding: 10px;
            min-height: 85vh;
        }

        /* টেলিগ্রাম উইজেট স্টাইল */
        .telegram-feed {
            background: #111;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #222;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
        }

        .join-btn {
            display: block;
            width: 70%;
            max-width: 250px;
            margin: 20px auto;
            padding: 12px;
            background: #24A1DE;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }
        .join-btn:hover { background: #1c82b6; transform: scale(1.05); }
    </style>
</head>
<body>

    <header>
        <h1>❄️ X WORLD ❄️</h1>
    </header>

    <div class="main-container">
        <div class="telegram-feed">
            <script async src="https://telegram.org/js/telegram-widget.js?22" 
                    data-telegram-channel="xwolrd90" 
                    data-limit="20" 
                    data-dark="1"></script>
        </div>
    </div>

    <a href="https://t.me/xwolrd90" class="join-btn">চ্যানেলে জয়েন করুন 🚀</a>

</body>
</html>
